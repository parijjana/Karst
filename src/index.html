<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Graph Knowledge Base</title>
    <script src="//unpkg.com/force-graph"></script>
    <style>
        :root {
            --bg-color: #0F172A;
            --panel-bg: #1E293B;
            --text-color: #E2E8F0;
            --accent-cyan: #06B6D4;
            --accent-violet: #8B5CF6;
            --border-color: #334155;
            --node-class: #F59E0B;
            --node-func: #10B981;
            --node-file: #3B82F6;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Left Panel Styles */
        #left-panel {
            width: 50vw;
            min-width: 300px;
            max-width: 90vw;
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto;
            background-color: rgba(15, 23, 42, 0.95);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }
        
        #resizer {
            width: 8px;
            height: 100%;
            background-color: var(--border-color);
            cursor: col-resize;
            z-index: 20;
            transition: background-color 0.2s;
        }
        #resizer:hover, #resizer.active {
            background-color: var(--accent-cyan);
        }
        
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(30, 41, 59, 1) 0%, rgba(15, 23, 42, 1) 100%);
        }
        
        .header h1 {
            margin: 0 0 15px 0;
            color: var(--accent-cyan);
            font-size: 1.5em;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { 
            background-color: rgba(30, 41, 59, 0.5); 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            padding: 10px; 
            text-align: center; 
            transition: all 0.2s ease;
        }
        .stat-card:hover { border-color: var(--accent-violet); background-color: rgba(139, 92, 246, 0.1); }
        .stat-card h3 { margin: 0 0 5px 0; font-size: 0.8em; color: #94A3B8; text-transform: uppercase;}
        .stat-card .value { font-size: 1.5em; font-weight: bold; color: var(--text-color); }

        .content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        
        .panel { 
            background-color: rgba(30, 41, 59, 0.3); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 15px; 
            margin-bottom: 20px; 
        }
        
        h2 { color: var(--accent-violet); font-size: 1.2em; margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: #94A3B8; font-weight: 500; }
        tr:hover { background-color: rgba(6, 182, 212, 0.05); }
        
        .clickable { cursor: pointer; transition: color 0.2s; }
        .clickable:hover { color: var(--accent-cyan); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;}
        .tab { 
            padding: 6px 12px; 
            background-color: transparent; 
            color: #94A3B8; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text-color); background-color: rgba(255,255,255,0.05); }
        .tab.active { background-color: var(--accent-cyan); color: var(--bg-color); font-weight: bold;}
        
        /* Right Panel (Graph) */
        #graph-container {
            flex-grow: 1;
            height: 100%;
            background-color: #0B1120;
            position: relative;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.9em;}
        .legend-item:last-child { margin-bottom: 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
        
        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-violet); }
    </style>
</head>
<body>
    <div id="left-panel">
        <div class="header">
            <h1>Code Graph</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>Projects</h3><div class="value" id="stat-projects">-</div></div>
                <div class="stat-card"><h3>Nodes</h3><div class="value" id="stat-indexed">-</div></div>
                <div class="stat-card"><h3>Queries</h3><div class="value" id="stat-queries">-</div></div>
                <div class="stat-card" title="Calculated tokens saved">
                    <h3>Saved</h3><div class="value" style="color: var(--accent-cyan);" id="stat-tokens">-</div>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="panel" id="projects-panel">
                <h2>Repositories</h2>
                <div id="projects-container">Loading...</div>
            </div>

            <div class="panel" id="drill-down-panel" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px;">
                    <h2 style="margin:0; border:none; padding:0;"><span id="dd-project-name" style="color: var(--text-color);"></span></h2>
                    <button onclick="resetView()" style="background:var(--accent-cyan); color:var(--bg-color); border:none; padding:4px 10px; border-radius:4px; cursor:pointer; font-weight:bold;">&larr; View All</button>
                </div>
                <div class="tabs">
                    <div class="tab active" onclick="showTab('files')">Files</div>
                    <div class="tab" onclick="showTab('nodes')">Nodes</div>
                    <div class="tab" onclick="showTab('telemetry')">Telemetry</div>
                    <div class="tab" onclick="showTab('commits')">Commits</div>
                </div>
                <div id="dd-content" style="font-size: 0.85em; overflow-x: auto;"></div>
            </div>
        </div>
    </div>
    
    <div id="resizer"></div>

    <div id="graph-container">
        <button onclick="if(graphInstance) graphInstance.zoomToFit(400, 50)" style="position:absolute; top:20px; right:20px; z-index:100; background:var(--panel-bg); color:var(--accent-cyan); border:1px solid var(--border-color); padding:8px 12px; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            &#x21BA; Reset Graph View
        </button>
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background: var(--accent-violet);"></div> Folders</div>
            <div class="legend-item"><div class="dot" style="background: var(--node-file);"></div> Files</div>
            <div class="legend-item"><div class="dot" style="background: var(--node-class);"></div> Classes</div>
            <div class="legend-item"><div class="dot" style="background: var(--node-func);"></div> Functions</div>
            <div class="legend-item" style="margin-top: 10px; font-size: 0.8em; color: #94A3B8;">Scroll to zoom, drag to pan</div>
        </div>
    </div>

    <script>
        let currentProjectId = null;
        let graphInstance = null;
        let projectsMap = {}; // Maps project ID -> Project Name

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            return await res.json();
        }

        async function initGraph() {
            const elem = document.getElementById('graph-container');
            
            // Show loading state
            graphInstance = ForceGraph()(elem)
                .backgroundColor('#0B1120')
                .nodeId('id')
                .nodeLabel('name')
                .nodeColor(node => {
                    if (node.type === 'project') return '#EF4444';
                    if (node.type === 'folder') return '#8B5CF6';
                    if (node.type === 'file') return '#3B82F6';
                    if (node.type === 'class') return '#F59E0B';
                    if (node.type === 'function') return '#10B981';
                    return '#94A3B8';
                })
                .nodeVal(node => {
                    if (node.type === 'project') return 10;
                    if (node.type === 'folder') return 7;
                    if (node.type === 'file') return 5;
                    if (node.type === 'class') return 3;
                    return 1;
                })
                .linkColor(() => 'rgba(148, 163, 184, 0.2)')
                .linkWidth(1)
                .linkDirectionalParticles(2)
                .linkDirectionalParticleWidth(1.5)
                .onNodeClick(node => {
                    // Center on node
                    graphInstance.centerAt(node.x, node.y, 1000);
                    graphInstance.zoom(8, 2000);
                    
                    // Select project on left panel if we click on a cluster
                    if (node.group !== undefined && node.group !== null && currentProjectId !== node.group) {
                        const pName = projectsMap[node.group];
                        if (pName) {
                            loadProject(node.group, pName);
                        }
                    }
                })
                .onBackgroundClick(() => {
                    graphInstance.zoomToFit(400, 50);
                });

            // Fetch global graph data
            try {
                const gData = await fetchJSON('/api/graph');
                
                // Grouping projects nearer: Calculate centers for each project
                const groupKeys = [...new Set(gData.nodes.map(n => n.group))].filter(g => g !== undefined && g !== null);
                const groups = {};
                groupKeys.forEach((k, i) => {
                    const angle = i * 2 * Math.PI / groupKeys.length;
                    const radius = Math.max(500, groupKeys.length * 150);
                    groups[k] = { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
                });
                
                // Apply a clustering force and increase repulsion
                graphInstance.d3Force('cluster', (alpha) => {
                    gData.nodes.forEach(node => {
                        if (node.group !== undefined && node.group !== null && groups[node.group]) {
                            node.vx -= (node.x - groups[node.group].x) * alpha * 0.05;
                            node.vy -= (node.y - groups[node.group].y) * alpha * 0.05;
                        }
                    });
                });
                graphInstance.d3Force('charge').strength(-80);
                
                graphInstance.graphData(gData);
                
                // Fit to canvas after initial layout
                setTimeout(() => {
                    graphInstance.zoomToFit(400, 50);
                }, 1000);
            } catch(e) {
                console.error("Failed to load graph", e);
            }

            // Handle window resize via ResizeObserver
            const ro = new ResizeObserver(entries => {
                if(graphInstance && entries.length > 0) {
                    const { width, height } = entries[0].contentRect;
                    graphInstance.width(width);
                    graphInstance.height(height);
                }
            });
            ro.observe(elem);
        }

        async function loadDashboard() {
            try {
                const stats = await fetchJSON('/api/stats');
                document.getElementById('stat-projects').innerText = stats.total_projects;
                document.getElementById('stat-indexed').innerText = stats.total_nodes;
                document.getElementById('stat-queries').innerText = stats.queries_served;
                
                // Format tokens nicely (e.g. 1.2k)
                let tokens = stats.tokens_saved;
                if (tokens > 1000000) tokens = (tokens/1000000).toFixed(1) + 'M';
                else if (tokens > 1000) tokens = (tokens/1000).toFixed(1) + 'K';
                document.getElementById('stat-tokens').innerText = tokens;

                const projects = await fetchJSON('/api/projects');
                let pHtml = '<table><tr><th>Name</th><th>Path</th></tr>';
                projects.forEach(p => {
                    projectsMap[p.id] = p.name;
                    pHtml += `<tr onclick="loadProject(${p.id}, '${p.name}')" class="clickable">
                                <td style="font-weight:bold;color:var(--accent-cyan);">${p.name}</td>
                                <td style="color:#94A3B8;">${p.path.split('/').pop()}</td>
                              </tr>`;
                });
                pHtml += '</table>';
                document.getElementById('projects-container').innerHTML = pHtml;
            } catch (e) {
                console.error(e);
            }
            
            initGraph();
        }

        async function loadProject(id, name) {
            currentProjectId = id;
            document.getElementById('dd-project-name').innerText = name;
            document.getElementById('drill-down-panel').style.display = 'block';
            document.getElementById('projects-panel').style.display = 'none';
            showTab('files');
            
            // Update graph to highlight this project
            try {
                const gData = await fetchJSON(`/api/graph?project_id=${id}`);
                graphInstance.graphData(gData);
                setTimeout(() => graphInstance.zoomToFit(400, 50), 500);
            } catch(e) {}
        }
        
        async function resetView() {
            currentProjectId = null;
            document.getElementById('drill-down-panel').style.display = 'none';
            document.getElementById('projects-panel').style.display = 'block';
            
            try {
                const gData = await fetchJSON('/api/graph');
                
                const groupKeys = [...new Set(gData.nodes.map(n => n.group))].filter(g => g !== undefined && g !== null);
                const groups = {};
                groupKeys.forEach((k, i) => {
                    const angle = i * 2 * Math.PI / groupKeys.length;
                    const radius = Math.max(500, groupKeys.length * 150);
                    groups[k] = { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
                });
                graphInstance.d3Force('cluster', (alpha) => {
                    gData.nodes.forEach(node => {
                        if (node.group !== undefined && node.group !== null && groups[node.group]) {
                            node.vx -= (node.x - groups[node.group].x) * alpha * 0.05;
                            node.vy -= (node.y - groups[node.group].y) * alpha * 0.05;
                        }
                    });
                });
                graphInstance.d3Force('charge').strength(-80);
                
                graphInstance.graphData(gData);
                setTimeout(() => graphInstance.zoomToFit(400, 50), 500);
            } catch(e) {}
        }

        async function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const contentDiv = document.getElementById('dd-content');
            contentDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#94A3B8;">Loading...</div>';

            try {
                const data = await fetchJSON(`/api/projects/${currentProjectId}/${tabName}`);
                let html = '<table><tr>';
                if (data.length === 0) {
                    contentDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#94A3B8;">No data available</div>';
                    return;
                }
                
                // headers
                Object.keys(data[0]).forEach(k => { 
                    // Hide some internal IDs for cleaner UI
                    if(k !== 'id' && k !== 'project_id' && k !== 'file_id') {
                        html += `<th>${k.replace('_', ' ').toUpperCase()}</th>`; 
                    }
                });
                html += '</tr>';
                
                // rows
                data.forEach(row => {
                    html += '<tr>';
                    Object.entries(row).forEach(([k, v]) => { 
                        if(k !== 'id' && k !== 'project_id' && k !== 'file_id') {
                            // truncate long text
                            let text = String(v);
                            if(text.length > 50) text = text.substring(0, 47) + '...';
                            html += `<td>${text}</td>`; 
                        }
                    });
                    html += '</tr>';
                });
                html += '</table>';
                contentDiv.innerHTML = html;
            } catch (e) {
                contentDiv.innerHTML = '<div style="color:red; padding:10px;">Error loading data</div>';
            }
        }

        // Resizer Logic
        const resizer = document.getElementById('resizer');
        const leftPanel = document.getElementById('left-panel');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            resizer.classList.add('active');
            document.body.style.cursor = 'col-resize';
            // Disable graph interaction during resize
            document.getElementById('graph-container').style.pointerEvents = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = e.clientX;
            // Respect min/max bounds
            if (newWidth >= 300 && newWidth <= window.innerWidth * 0.9) {
                leftPanel.style.width = `${newWidth}px`;
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizer.classList.remove('active');
                document.body.style.cursor = 'default';
                document.getElementById('graph-container').style.pointerEvents = 'auto';
            }
        });

        window.onload = loadDashboard;
    </script>
</body>
</html>
